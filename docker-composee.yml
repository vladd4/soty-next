version: '3.9'

services:
  app:
    build: .
    container_name: soty-app
    restart: always
    environment:
      - NODE_ENV=production
    expose:
      - "3000"   # Exposes port to other containers, not host
    networks:
      - soty-network

  nginx:
    image: nginx:alpine
    container_name: soty-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - soty-network

networks:
  soty-network:
    driver: bridge
