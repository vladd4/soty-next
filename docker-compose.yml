version: "3.9"

networks:
  soty-network:

services:
  nextjs-app:
    image: soty-next_nextjs-app
    container_name: nextjs-app
    networks:
      - soty-network

  soty-nginx:
    image: nginx:alpine
    container_name: soty-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    depends_on:
      - nextjs-app
    networks:
      - soty-network
