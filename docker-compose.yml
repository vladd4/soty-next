networks:
  soty-network:

services:
  nextjs-app:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-app
    ports:
      - "3000:3000"
    networks:
      - soty-network
    restart: unless-stopped

  soty-nginx:
    image: nginx:alpine
    container_name: soty-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - nextjs-app
    networks:
      - soty-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do
      certbot renew;
      sleep 12h & wait $${!};
      done"
    depends_on:
      - soty-nginx
    networks:
      - soty-network
    restart: unless-stopped
