upstream nextjs {
    server nextjs-app:3000;
}

# HTTP (для редіректу + certbot challenge)
server {
    listen 80;
    server_name soty.lviv.ua;

    # ВАЖЛИВО: спочатку обробляємо challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Потім редірект
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name soty.lviv.ua;

    ssl_certificate /etc/letsencrypt/live/soty.lviv.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soty.lviv.ua/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # (опціонально, але рекомендовано)
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://nextjs;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}